name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout$v4

      - name: Set up .NET
        uses: actions/setup-dotnet$v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/Arcadium.Scanner/Arcadium.Scanner.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Arcadium.Scanner/Arcadium.Scanner.csproj --configuration Release --no-build --no-restore
